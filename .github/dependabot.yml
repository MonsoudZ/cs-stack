# Automated dependency updates — opens grouped PRs weekly so security and
# version bumps (like the Astro advisory caught manually) surface on their own.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # One PR for routine bumps; security updates still open individually.
      npm-dependencies:
        patterns: ["*"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
