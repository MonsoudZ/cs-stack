name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref so rapid pushes don't pile up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # Fail on a known high-severity dependency advisory (security audit —
      # distinct from `npm run audit`, which is the a11y/quality gate below).
      - run: npm audit --audit-level=high
      - run: npm test
      # `audit` builds the site, then runs the accessibility/quality gate
      # (scripts/audit.mjs) against the generated HTML — replaces a bare build.
      - run: npm run audit

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      # Playwright's webServer builds + previews the site, then drives chromium
      # to confirm the islands hydrate and respond to real input.
      - run: npm run test:e2e

  visual:
    runs-on: ubuntu-latest
    # Run inside the SAME pinned Playwright image the baselines were generated in
    # (scripts/visual.sh), so screenshots are pixel-identical — no OS/font drift.
    # Keep this tag in sync with the @playwright/test version in package-lock.json.
    container: mcr.microsoft.com/playwright:v1.60.0-noble
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # Visual-regression snapshots of the key diagrams (its own config; the
      # webServer builds + previews the real bundle).
      - run: npm run test:visual
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-diffs
          path: test-results/
          retention-days: 7
