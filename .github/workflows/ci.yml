name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      # `audit` builds the site, then runs the accessibility/quality gate
      # (scripts/audit.mjs) against the generated HTML — replaces a bare build.
      - run: npm run audit

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      # Playwright's webServer builds + previews the site, then drives chromium
      # to confirm the islands hydrate and respond to real input.
      - run: npm run test:e2e
